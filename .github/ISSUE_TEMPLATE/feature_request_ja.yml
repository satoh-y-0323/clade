name: 機能追加・改善提案
description: 新機能の追加や既存機能の改善を提案する
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ご提案ありがとうございます！
        追加・改善したい内容をできるだけ具体的に記載してください。

  - type: textarea
    id: problem
    attributes:
      label: どんな問題を解決したいですか？
      description: この提案の背景や困っていることを教えてください。
      placeholder: "例: 大規模プロジェクトでは手動でエージェントを切り替えるのが手間なので、自動的に次のエージェントへ引き継いでほしい。"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 提案する解決策
      description: どのような機能・変更があれば解決できますか？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 検討した代替案
      description: 他に試した方法や回避策があれば教えてください。
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: 対象エリア
      description: Clade のどの部分に関する提案ですか？
      options:
        - エージェントルール
        - ワークフロー / フェーズ
        - フック（Hooks）
        - スキル（Skills）
        - MCP連携
        - セットアップスクリプト
        - ドキュメント
        - その他
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 補足情報
      description: 参考リンク・モックアップ・その他の補足があれば記載してください。
    validations:
      required: false
